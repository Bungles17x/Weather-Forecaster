<!DOCTYPE html>
<html>
<head>
    <title>API Test</title>
</head>
<body>
    <h1>OpenWeatherMap API Test</h1>
    <div id="result">Testing...</div>
    
    <script>
        // Test the API exactly like the app does
        const API_KEY = '01c50e8c663fe1d38db9f79fbedb3136';
        const LOCATION = 'New York, NY';
        
        async function testAPI() {
            const resultDiv = document.getElementById('result');
            
            try {
                const response = await fetch(
                    `https://api.openweathermap.org/data/2.5/weather?q=${encodeURIComponent(LOCATION)}&appid=${API_KEY}&units=imperial`
                );
                
                if (response.ok) {
                    const data = await response.json();
                    resultDiv.innerHTML = `
                        <h2>✅ API Working!</h2>
                        <p><strong>City:</strong> ${data.name}</p>
                        <p><strong>Temperature:</strong> ${data.main.temp}°F</p>
                        <p><strong>Weather:</strong> ${data.weather[0].description}</p>
                        <p><strong>Humidity:</strong> ${data.main.humidity}%</p>
                        <p><strong>Wind:</strong> ${data.wind.speed} mph</p>
                        <p><strong>Your app should show this data!</strong></p>
                    `;
                } else {
                    const error = await response.json();
                    resultDiv.innerHTML = `
                        <h2>❌ API Error</h2>
                        <p><strong>Status:</strong> ${response.status}</p>
                        <p><strong>Error:</strong> ${error.message}</p>
                    `;
                }
            } catch (error) {
                resultDiv.innerHTML = `
                    <h2>❌ Network Error</h2>
                    <p><strong>Error:</strong> ${error.message}</p>
                `;
            }
        }
        
        testAPI();
    </script>
</body>
</html>
