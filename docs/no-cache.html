<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather Forecaster - Cache Clear</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
        color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
        padding: 20px;
      }
      .container {
        text-align: center;
        background: rgba(0, 0, 0, 0.3);
        padding: 2rem;
        border-radius: 15px;
        backdrop-filter: blur(10px);
        max-width: 500px;
      }
      h1 { font-size: 2rem; margin-bottom: 1rem; }
      .status { font-size: 1.2rem; margin: 1rem 0; }
      .success { color: #4fc3f7; }
      .error { color: #ff6b6b; }
      button {
        background: #4fc3f7;
        color: white;
        border: none;
        padding: 1rem 2rem;
        border-radius: 8px;
        font-size: 1rem;
        cursor: pointer;
        margin: 0.5rem;
      }
      button:hover { background: #29b6f6; }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>🧹 Weather App Cache Clear</h1>
      <div class="status" id="status">Clearing caches and reloading...</div>
      <button onclick="clearAndReload()">🔄 Clear Cache & Reload</button>
      <button onclick="goToApp">🌤️ Go to Weather App</button>
    </div>

    <script>
      async function clearAllCaches() {
        const status = document.getElementById('status');
        
        try {
          // Clear all service workers
          if ('serviceWorker' in navigator) {
            const registrations = await navigator.serviceWorker.getRegistrations();
            for (const registration of registrations) {
              await registration.unregister();
              console.log('Unregistered service worker:', registration.scope);
            }
          }
          
          // Clear all caches
          if ('caches' in window) {
            const cacheNames = await caches.keys();
            for (const cacheName of cacheNames) {
              await caches.delete(cacheName);
              console.log('Deleted cache:', cacheName);
            }
          }
          
          // Clear localStorage
          localStorage.clear();
          
          // Clear sessionStorage
          sessionStorage.clear();
          
          status.innerHTML = '<span class="success">✅ All caches cleared! Reloading...</span>';
          
          // Force reload after a short delay
          setTimeout(() => {
            window.location.href = '/Weather-Forecaster/';
          }, 2000);
          
        } catch (error) {
          status.innerHTML = '<span class="error">❌ Error clearing caches: ' + error.message + '</span>';
          console.error('Cache clearing error:', error);
        }
      }
      
      function clearAndReload() {
        clearAllCaches();
      }
      
      function goToApp() {
        window.location.href = '/Weather-Forecaster/';
      }
      
      // Auto-run on page load
      clearAllCaches();
    </script>
  </body>
</html>
