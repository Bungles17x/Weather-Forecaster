<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src *; script-src * 'unsafe-inline' 'unsafe-eval'; style-src * 'unsafe-inline' 'unsafe-eval' https://fonts.googleapis.com; font-src * data: https://fonts.gstatic.com https://fonts.googleapis.com; img-src * data: blob:; connect-src *;">
    <title>Weather Forecaster</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      body {
        margin: 0;
        padding: 0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
      }
      .redirect-container {
        text-align: center;
        padding: 2rem;
        background: rgba(0, 0, 0, 0.3);
        border-radius: 15px;
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        max-width: 400px;
      }
      h1 {
        margin: 0 0 1rem 0;
        font-size: 2rem;
      }
      p {
        margin: 0.5rem 0;
        opacity: 0.8;
      }
      a {
        color: #4fc3f7;
        text-decoration: none;
        font-weight: bold;
      }
      a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <div class="redirect-container">
      <h1>🌤️ Weather Forecaster</h1>
      <p>Loading weather application...</p>
      <p>If you are not redirected automatically, <a href="./index.html">click here</a>.</p>
    </div>
    <script>
      // Check if we're already on the main app or a hash route
      if (!window.location.hash && !window.location.pathname.includes('index.html')) {
        // Redirect to main app for GitHub Pages SPA routing
        window.location.replace('./index.html');
      } else {
        // Load main app
        window.location.replace('./index.html' + window.location.hash + window.location.search);
      }
    </script>
  </body>
</html>
